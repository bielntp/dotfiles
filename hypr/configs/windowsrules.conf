windowrule = match:class .*, suppress_event maximize

windowrule = match:class ^()$, match:title ^()$, match:xwayland 1, match:float 1, match:fullscreen 0, match:pin 0, no_focus on

windowrule = match:class ^(hyprland-run)$, float on
windowrule = match:class ^(hyprland-run)$, move 20 (monitor_h-120)

windowrule = match:class .*, opacity 0.92 0.88
windowrule = match:class ^([Bb]rave.*)$, opacity 1.0
windowrule = match:class ^([Ss]potify)$, opacity 0.80 0.75
windowrule = match:class ^(google-chrome)$, opacity 1.0
windowrule = match:class ^(kitty)$, opacity 0.88 0.80

windowrule = match:title ^(Open File|Select a File|Choose wallpaper|Open Folder|Save As|Library|File Upload)(.*)$, float on
windowrule = match:title ^(Open File|Select a File|Choose wallpaper|Open Folder|Save As|Library|File Upload)(.*)$, size (monitor_w*.6) (monitor_h*.6)
windowrule = match:title ^(Open File|Select a File|Choose wallpaper|Open Folder|Save As|Library|File Upload)(.*)$, center on
windowrule = match:title ^(Open File|Select a File|Choose wallpaper|Open Folder|Save As|Library|File Upload)(.*)$, opacity 0.80 0.72
windowrule = match:title ^(Save As|Save a File|Save File|Pick Files|Open File|Open Files)$, float on
windowrule = match:title ^(Save As|Save a File|Save File|Pick Files|Open File|Open Files)$, size (monitor_w*.6) (monitor_h*.6)
windowrule = match:title ^(Save As|Save a File|Save File|Pick Files|Open File|Open Files)$, center on
windowrule = match:title ^(Save As|Save a File|Save File|Pick Files|Open File|Open Files)$, opacity 0.80 0.72

windowrule = match:class ^(brave|google-chrome)$, match:title .*save.*, size (monitor_w*.6) (monitor_h*.6)
windowrule = match:class ^(brave|google-chrome)$, match:title .*save.*, float on
windowrule = match:class ^(brave|google-chrome)$, match:title .*save.*, center on

windowrule = match:title .*wants\ to\ save.*, size (monitor_w*.6) (monitor_h*.6)
windowrule = match:title .*wants\ to\ save.*, float on
windowrule = match:title .*wants\ to\ save.*, center on

windowrule = match:class ^(pavucontrol|nm-connection-editor)$, size (monitor_w*.45) (monitor_h*.45)
windowrule = match:class ^(pavucontrol|nm-connection-editor|blueberry\.py)$, float on
windowrule = match:class ^(pavucontrol|nm-connection-editor)$, center on
# windowrule = match:class ^(pavucontrol|nm-connection-editor)$, pin on

windowrule = match:class ^(org.twosheds.iwgtk)$, size (monitor_w*.45) (monitor_h*.45)
windowrule = match:class ^(org.twosheds.iwgtk|iwgtk)$, float on
windowrule = match:class ^(org.twosheds.iwgtk|iwgtk)$, center on
# windowrule = match:class ^(org.twosheds.iwgtk|iwgtk)$, pin on

windowrule = match:class ^(blueman-manager)$, size (monitor_w*.45) (monitor_h*.45)
windowrule = match:class ^(blueman-manager)$, opacity 0.80 0.72
windowrule = match:class ^(blueman-manager)$, float on
windowrule = match:class ^(blueman-manager)$, center on
# windowrule = match:class ^(blueman-manager)$, pin on

windowrule = match:class ^(org.pulseaudio.pavucontrol)$, opacity 0.80 0.72
windowrule = match:class ^(org.pulseaudio.pavucontrol)$, float on
windowrule = match:class ^(org.pulseaudio.pavucontrol)$, center on
windowrule = match:class ^(org.pulseaudio.pavucontrol)$, size (monitor_w*.6) (monitor_h*.6)
# windowrule = match:class ^(org.pulseaudio.pavucontrol)$, pin on

windowrule = match:title ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$, float on
windowrule = match:title ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$, center on
windowrule = match:title ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$, pin on

windowrule = match:class ^([Ss]xiv)$, float on
windowrule = match:class ^([Ss]xiv)$, center on
# windowrule = match:class ^([Ss]xiv)$, pin on

windowrule = match:title .*\.exe, immediate on
windowrule = match:class ^(steam_app).*, immediate on

layerrule = match:namespace logout_dialog, blur on
layerrule = match:namespace logout_dialog, ignore_alpha 0.15
layerrule = match:namespace logout_dialog, no_anim on

layerrule = match:namespace swaync-notification-window, blur on
layerrule = match:namespace swaync-notification-window, ignore_alpha 0.5
layerrule = match:namespace swaync-notification-window, no_anim on

layerrule = match:namespace swaync-control-center, blur on
layerrule = match:namespace swaync-control-center, ignore_alpha 0.5
layerrule = match:namespace swaync-control-center, no_anim on
